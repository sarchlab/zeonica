architecture:
  name: "NeuraMultiCgra"
  version: "1.0"

multi_cgra_defaults:
  base_topology: "mesh"
  rows: 1
  columns: 1

cgra_defaults:
  rows: 4
  columns: 4
  ctrl_mem_items: 20
  base_topology: "mesh"

tile_defaults:
  num_registers: 64
  local_memory_words: 2048

link_defaults:
  latency: 1
  bandwidth: 32

extensions:
  crossbar: false

simulator:
  execution_model: "serial"
  execution_policy: "elastic_scheduled"
  enable_fifo_model: true

  logging:
    enabled: true
    enableTrace: true
    file: "<test>.json.log"

  driver:
    name: "Driver"
    frequency: "1GHz"
    port_incoming_buffer_depth: 8
    port_outgoing_buffer_depth: 8

  device:
    name: "Device"
    frequency: "1GHz"
    bind_to_architecture: true
    memory_mode: "local"
    port_incoming_buffer_depth: 8
    port_outgoing_buffer_depth: 8
